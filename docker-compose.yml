services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plausible_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - "C:\\docker-data\\plausible\\postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plausible_db -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: plausible_events_db
      CLICKHOUSE_USER: plausible
      CLICKHOUSE_PASSWORD: plausiblepass
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - plausible_clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8123/ping | grep -q Ok."]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  migrate:
    image: ghcr.io/plausible/community-edition:v3.2.0
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "/entrypoint.sh db createdb &&
             /entrypoint.sh db migrate"
    environment:
      BASE_URL: "http://localhost:8000"
      SECRET_KEY_BASE: "9f6a7c1e4d3b2a8f5e6d7c9b0a1f2e3d4c5b6a7988d7e6f5c4b3a2910e1d2c3f7a8b9c0d1e2f3a4b5c6d7e8f90123456"
      TOTP_VAULT_KEY: "LwqQb8n8zv8W2rWjYw0m2A6M0Gq1JvQ0Qj4x7LwqH7A="
      DATABASE_URL: "ecto://postgres:postgres@postgres:5432/plausible_db"
      CLICKHOUSE_DATABASE_URL: "http://plausible:plausiblepass@clickhouse:8123/plausible_events_db"
      DISABLE_REGISTRATION: "false"

  analytics:
    image: ghcr.io/plausible/community-edition:v3.2.0
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      BASE_URL: "http://localhost:8000"
      SECRET_KEY_BASE: "9f6a7c1e4d3b2a8f5e6d7c9b0a1f2e3d4c5b6a7988d7e6f5c4b3a2910e1d2c3f7a8b9c0d1e2f3a4b5c6d7e8f90123456"
      TOTP_VAULT_KEY: "LwqQb8n8zv8W2rWjYw0m2A6M0Gq1JvQ0Qj4x7LwqH7A="
      DATABASE_URL: "ecto://postgres:postgres@postgres:5432/plausible_db"
      CLICKHOUSE_DATABASE_URL: "http://plausible:plausiblepass@clickhouse:8123/plausible_events_db"
      DISABLE_REGISTRATION: "false"

  otterwiki:
    image: redimp/otterwiki:2
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - "C:\\docker-data\\otterwiki\\app-data:/app-data"
      - "C:\\docker-data\\otterwiki\\custom:/app/otterwiki/static/custom"

volumes:
  plausible_clickhouse: